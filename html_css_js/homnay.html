<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hôm nay - Grow Personal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar-container">
    <nav class="navbar-pill">
      <a href="trangchu.html" class="navbar-link ">Trang chủ</a>
      <a href="danhsachthuthach.html" class="navbar-link ">Danh sách Thử thách</a>
      <a href="homnay.html" class="navbar-link active">Hôm nay</a>
    </nav>
  </header>

<section id="view-today" class="view-section active">
    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
      <div class="text-muted text-primary-color" style="display: flex; align-items: center; gap: 0.375rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Hành trình hôm nay
      </div>
      <h1 class="heading-large">Hôm nay</h1>
      <p id="today-date-string" class="text-muted" style="font-style: italic; font-weight: 500;"></p>
    </div>

    <!-- Summary Statistics Card -->
    <div class="card" style="flex-direction: row; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem; padding: 1.25rem 1.5rem;">
      <div style="display: flex; flex-direction: column; gap: 0.25rem;">
        <h3 class="heading-small" style="font-style: normal; font-weight: 700;">Tiến độ hoàn thành</h3>
        <p id="today-summary-desc" class="text-muted">Đang tải...</p>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <div style="text-align: right;">
          <span id="today-completion-pct" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">0%</span>
          <div class="text-muted" style="font-size: 0.625rem; font-weight: 700; text-transform: uppercase;">Hoàn thành</div>
        </div>
        <div style="width: 80px; height: 6px; background-color: var(--surface-3); border-radius: 50px; overflow: hidden;">
          <div id="today-summary-bar" style="height: 100%; background-color: var(--primary); width: 0%; transition: width 400ms ease;"></div>
        </div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1.25rem;">
      <h3 class="heading-small">Nhiệm vụ của bạn</h3>
      <div id="today-challenges-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
        <!-- Dynamic active challenge cards for today will render here -->
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
