<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách Thử thách - Grow Personal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar-container">
    <nav class="navbar-pill">
      <a href="trangchu.html" class="navbar-link ">Trang chủ</a>
      <a href="danhsachthuthach.html" class="navbar-link active">Danh sách Thử thách</a>
      <a href="homnay.html" class="navbar-link ">Hôm nay</a>
    </nav>
  </header>

<section id="view-challenges" class="view-section active">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h1 class="heading-large">Thử thách của bạn</h1>
        <p class="text-muted">Nơi quản lý tất cả các thói quen cam kết của bạn.</p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Tạo thử thách mới
      </button>
    </div>

    <div id="challenges-grid" class="grid-2 grid-3">
      <!-- Dynamic Challenge Cards will render here -->
    </div>
  </section>

<div id="create-modal" class="modal-overlay" onclick="closeCreateModalOnOverlay(event)">
    <div class="modal-content">
      <h2 class="heading-medium" style="font-family: var(--font-serif);">Bắt đầu thử thách mới</h2>
      
      <div class="form-group">
        <label class="form-label" for="input-title">Tên thử thách của bạn:</label>
        <input type="text" id="input-title" class="form-input" placeholder="Ví dụ: Đọc sách 10 trang, Dậy sớm 5:30, ..." required>
      </div>

      <div class="form-group">
        <label class="form-label" for="input-days">Thời gian cam kết (số ngày):</label>
        <input type="number" id="input-days" class="form-input" min="1" max="365" value="66" required>
      </div>

      <div class="form-group">
        <label class="form-label">Chọn hạt giống loài hoa:</label>
        <div class="flower-options-group">
          <div>
            <input type="radio" name="flower-selection" id="seed-sunflower" value="sunflower" class="flower-radio" checked>
            <label for="seed-sunflower" class="flower-select-btn">
              <span style="font-size: 1.5rem;">🌻</span>
              <span style="font-size: 0.75rem;">Hướng Dương</span>
            </label>
          </div>
          <div>
            <input type="radio" name="flower-selection" id="seed-lavender" value="lavender" class="flower-radio">
            <label for="seed-lavender" class="flower-select-btn">
              <span style="font-size: 1.5rem;">🪻</span>
              <span style="font-size: 0.75rem;">Oải Hương</span>
            </label>
          </div>
          <div>
            <input type="radio" name="flower-selection" id="seed-tulip" value="tulip" class="flower-radio">
            <label for="seed-tulip" class="flower-select-btn">
              <span style="font-size: 1.5rem;">🌷</span>
              <span style="font-size: 0.75rem;">Tulip</span>
            </label>
          </div>
        </div>

  <script src="main.js"></script>
</body>
</html>
