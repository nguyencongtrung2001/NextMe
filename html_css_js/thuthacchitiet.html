<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết Thử thách - Grow Personal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar-container">
    <nav class="navbar-pill">
      <a href="trangchu.html" class="navbar-link ">Trang chủ</a>
      <a href="danhsachthuthach.html" class="navbar-link active">Danh sách Thử thách</a>
      <a href="homnay.html" class="navbar-link ">Hôm nay</a>
    </nav>
  </header>

<section id="view-detail" class="view-section active">
 

    <!-- Detail Banner Card -->
    <div class="card" style="background-color: var(--surface); flex-direction: row; align-items: center; flex-wrap: wrap; gap: 1.5rem; padding: 1.75rem 2rem;">
      <div id="detail-flower-box" class="flower-icon flower-sunflower" style="width: 54px; height: 54px; font-size: 1.75rem;">🌻</div>
      <div style="flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 0.375rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span id="detail-status-badge" class="badge badge-primary">Đang hoạt động</span>
        </div>
        <h2 id="detail-title" class="heading-medium" style="font-family: var(--font-serif);">Đang tải...</h2>
        <div id="detail-date-range" class="text-muted" style="font-size: 0.75rem;"></div>
      </div>
      <div id="detail-streak-box">
        <!-- Streak pill goes here -->
      </div>
    </div>

    <!-- Tab Section -->
    <div>
      <div class="tab-header">
        <button class="tab-trigger active" onclick="switchDetailTab('overview')">Tổng quan & Hôm nay</button>
        <button class="tab-trigger" onclick="switchDetailTab('history')">Nhật ký hành trình</button>
      </div>

      <!-- Tab Content: Overview -->
      <div id="tab-overview" class="tab-content active">
        <!-- Heatmap -->
        <div class="heatmap-card">
          <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
              <h3 class="heading-small" style="font-style: normal; font-weight: 700;">Bản đồ tiến độ hành trình</h3>
              <p class="text-muted">Bấm chọn một ô ngày để xem nhật ký cụ thể.</p>
            </div>
            <div id="detail-overview-pct" class="text-muted font-mono" style="font-weight: 700; color: var(--primary);">Tiến độ: 0%</div>
          </div>

          <div id="heatmap-grid" class="heatmap-cells-grid">
            <!-- Heatmap cells dynamic -->
          </div>

          <div class="legend-row">
            <div class="legend-item"><div class="legend-box status-done"></div><span>Đã xong</span></div>
            <div class="legend-item"><div class="legend-box status-missed"></div><span>Bỏ lỡ</span></div>
            <div class="legend-item"><div class="legend-box status-today-pending"></div><span>Hôm nay</span></div>
            <div class="legend-item"><div class="legend-box status-lock"></div><span>Chưa mở</span></div>
          </div>
        </div>

        <!-- Heatmap Selected Cell Detail Panel -->
        <div id="heatmap-detail-panel" class="detail-panel" style="display: none;">
          <!-- Day detail description renders here -->
        </div>

        <!-- Inline Logger Card for Today (if pending) -->
        <div id="detail-quick-log-card" class="card" style="display: none;">
          <h3 class="heading-small" style="display: flex; align-items: center; gap: 0.5rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--amber);"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            Nhật ký hôm nay
          </h3>
          <div class="mood-selector-container">
            <label class="form-label">Cảm xúc của bạn hôm nay:</label>
            <div id="detail-mood-btn-group" class="mood-btn-group">
              <!-- mood options -->
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Ghi nhận nội dung cảm xúc:</label>
            <textarea id="detail-note-input" class="form-input" placeholder="Hôm nay bạn đã làm được gì? Cảm thấy thế nào?" rows="3" style="resize: none;"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Thêm ảnh hoặc video:</label>
            <input type="file" id="detail-media-input" accept="image/*,video/*" multiple class="form-input" onchange="previewMedia('detail-log', this)" style="display: none;">
            <label for="detail-media-input" class="btn btn-outline" style="align-self: flex-start; cursor: pointer;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Tải lên ảnh/video
            </label>
            <div id="preview-detail-log" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;"></div>
          </div>

          <div class="quick-complete-row">
            <button id="btn-detail-complete" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              Tick hoàn thành ngày hôm nay
            </button>
          </div>
        </div>
      </div>

      <!-- Tab Content: History Logs -->
      <div id="tab-history" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 0.5rem;">
          <div>
            <h3 class="heading-small" style="font-style: normal; font-weight: 700;">Nhật ký chi tiết</h3>
            <p class="text-muted">Xem lại các ngày đã tích.</p>
          </div>
          <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="log-search-input" class="search-input" placeholder="Tìm kiếm theo cảm xúc..." oninput="handleLogSearch()">
          </div>
        </div>

        <div id="detail-timeline-container" class="timeline-container">
          <!-- Timeline items render dynamically -->
        </div>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
